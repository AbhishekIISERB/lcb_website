<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LCB — Laboratory of Chromatin Biology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2efe9;
      --white: #ffffff;
      --ink: #1a1916;
      --muted: #7c7870;
      --rule: #dedad3;
      --tab-bg: #e8e4dc;
      --accent: #3d6b41;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: transparent;
      color: var(--ink);
      font-size: 15px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #backdrop-slider {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2;
      background-size: cover; background-position: center;
      transition: background-image 2.5s ease-in-out;
      background-image: url('backdrop/bg1.jpeg');
    }
    #backdrop-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
      background: var(--bg); opacity: 0.4;
    }
    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
      padding: 1.4rem 3rem 0;
    }
    .header-top {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 1rem;
    }
    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 400; color: var(--ink);
    }
    .site-meta { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .tabs {
      display: flex; list-style: none;
      border-top: 1px solid var(--rule);
      margin: 0 -3rem; padding: 0 3rem;
      overflow-x: auto;
    }
    .tab-btn {
      background: none; border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem; font-weight: 400;
      color: var(--muted);
      padding: 0.75rem 1.2rem;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .tab-btn::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--ink);
      transform: scaleX(0); transition: transform 0.2s;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--ink); font-weight: 500; }
    .tab-btn.active::after { transform: scaleX(1); }
    .content {
      flex: 1;
      max-width: 820px; width: 100%;
      margin: 0 auto;
      padding: 3rem;
    }
    /* Wider layout for publications and research */
    .content.wide { max-width: 1100px; }

    .panel { display: none; animation: fadein 0.22s ease; }
    .panel.active { display: block; }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* Loading spinner shown while fetching */
    .tab-loading {
      display: flex; align-items: center; justify-content: center;
      padding: 4rem 0; color: var(--muted); font-size: 0.82rem;
      gap: 0.6rem;
    }
    .tab-loading::before {
      content: '';
      width: 16px; height: 16px;
      border: 2px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem; font-weight: 400; color: var(--ink);
      margin-bottom: 0.35rem; line-height: 1.2;
    }
    h2 em { color: var(--accent); font-style: italic; }
    .page-sub { font-size: 0.85rem; color: var(--ink); font-weight: 400; margin-bottom: 2.5rem; line-height: 1.6; }

    /* HOME */
    .home-hero { padding: 1.5rem 0 2.5rem; border-bottom: 1px solid var(--rule); margin-bottom: 2.5rem; }
    .home-hero .kicker { font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 1rem; display: block; }
    .home-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 4vw, 3rem); font-weight: 400; line-height: 1.2; color: var(--ink); margin-bottom: 1.2rem; }
    .home-hero h1 em { color: var(--accent); font-style: italic; }
    .home-hero p { font-size: 0.92rem; color: var(--ink); max-width: 560px; line-height: 1.85; font-weight: 400; }
    .home-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--rule); }
    .home-card { background: var(--white); padding: 1.6rem; }
    .home-card .label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 0.6rem; display: block; }
    .home-card h3 { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 400; color: var(--ink); margin-bottom: 0.5rem; line-height: 1.3; }
    .home-card p { font-size: 0.82rem; color: var(--ink); line-height: 1.75; font-weight: 400; }
    .home-card .link { display: inline-block; margin-top: 0.9rem; font-size: 0.75rem; color: var(--accent); font-weight: 500; cursor: pointer; }
    .home-card .link:hover { text-decoration: underline; }

    /* ABOUT */
    .about-layout { display: grid; grid-template-columns: 145px 1fr; gap: 2.5rem; margin-bottom: 2rem; }
    .about-photo { width: 145px; height: 175px; background: var(--tab-bg); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--rule); flex-shrink: 0; overflow: hidden; position: relative; }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .about-body .role { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 1rem; }
    .about-body p { font-size: 0.88rem; color: var(--ink); line-height: 1.9; font-weight: 400; margin-bottom: 0.85rem; }
    .stats-row { display: flex; gap: 2.5rem; padding-top: 1.4rem; border-top: 1px solid var(--rule); }
    .stat .n { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--ink); display: block; line-height: 1; }
    .stat .l { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; display: block; }
    .cv-download { padding-top: 1.4rem; border-top: 1px solid var(--rule); }
    .cv-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--ink); color: var(--bg);
      text-decoration: none;
      padding: 0.7rem 1.5rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.25s, transform 0.2s;
    }
    .cv-btn:hover { background: var(--accent); transform: translateY(-1px); }
    .cv-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .cv-label { font-size: 0.68rem; color: var(--muted); margin-top: 0.6rem; display: block; }

    /* ABOUT — sub-sections */
    .about-section { margin-top: 2.5rem; }
    .about-section-head {
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent); font-weight: 500;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--rule);
      margin-bottom: 1rem;
    }
    .about-section p.intro {
      font-size: 0.87rem; color: var(--muted); line-height: 1.9; font-weight: 300; margin-bottom: 1.5rem;
    }
    .timeline-item {
      padding: 0.8rem 0; border-top: 1px solid var(--rule);
      display: grid; grid-template-columns: 1fr; gap: 0.2rem;
    }
    .timeline-item:last-child { border-bottom: 1px solid var(--rule); }
    .timeline-role { font-size: 0.88rem; font-weight: 500; color: var(--ink); line-height: 1.4; }
    .timeline-place { font-size: 0.86rem; color: var(--ink); font-weight: 400; line-height: 1.6; }
    .timeline-date { font-size: 0.72rem; color: var(--accent); font-weight: 500; letter-spacing: 0.04em; }
    .about-list { list-style: none; padding: 0; }
    .about-list li {
      position: relative; padding: 0.55rem 0 0.55rem 1.1rem;
      font-size: 0.88rem; color: var(--ink); line-height: 1.75; font-weight: 400;
      border-top: 1px solid var(--rule);
    }
    .about-list li:last-child { border-bottom: 1px solid var(--rule); }
    .about-list li::before {
      content: ''; position: absolute; left: 0; top: 1.05rem;
      width: 5px; height: 5px; background: var(--accent); border-radius: 50%;
    }
    .course-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule);
    }
    .course-item {
      background: var(--white); padding: 0.7rem 1rem;
      font-size: 0.86rem; color: var(--ink); font-weight: 400;
    }
    .course-item strong { color: var(--ink); font-weight: 500; }
    @media (max-width: 680px) { .course-grid { grid-template-columns: 1fr; } }

    /* RESEARCH */
    .r-item { padding: 1.2rem 0; border-top: 1px solid var(--rule); display: grid; grid-template-columns: 2.2rem 1fr; gap: 1.1rem; }
    .r-item:last-child { border-bottom: 1px solid var(--rule); }
    .r-num { font-family: 'Playfair Display', serif; font-size: 0.85rem; color: var(--rule); padding-top: 2px; }
    .r-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.3rem; }
    .r-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.75; font-weight: 300; }

    /* Research Posters */
    .poster-grid {
      display: flex; flex-direction: column; gap: 2rem;
      margin-top: 1.5rem;
    }
    .poster-card {
      border: 1px solid var(--rule);
      background: var(--white);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }
    .poster-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .poster-card img {
      width: 100%; display: block;
      transition: transform 0.4s ease;
    }
    .poster-card:hover img {
      transform: scale(1.01);
    }
    .poster-caption {
      padding: 1rem 1.2rem;
      border-top: 1px solid var(--rule);
      display: flex; justify-content: space-between; align-items: center;
    }
    .poster-caption .poster-label {
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); font-weight: 500;
    }
    .poster-caption .poster-title {
      font-size: 0.88rem; font-weight: 500; color: var(--ink);
    }
    .poster-caption .poster-expand {
      font-size: 0.72rem; color: var(--muted); font-weight: 400;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .poster-caption .poster-expand svg { width: 13px; height: 13px; }

    /* PUBLICATIONS */
    .pub-item { padding: 1.2rem 0; border-top: 1px solid var(--rule); display: grid; grid-template-columns: 2.8rem 1fr; gap: 1.1rem; }
    .pub-item:last-child { border-bottom: 1px solid var(--rule); }
    .pub-yr { font-family: 'Playfair Display', serif; font-size: 0.85rem; color: var(--muted); padding-top: 2px; }
    .pub-title { font-size: 0.88rem; color: var(--ink); line-height: 1.5; margin-bottom: 0.3rem; }
    .pub-meta { font-size: 0.76rem; color: var(--muted); font-weight: 300; }
    .pub-meta a { color: var(--accent); text-decoration: none; }
    .pub-meta a:hover { text-decoration: underline; }

    /* PDF Embed */
    .pdf-container {
      border: 1px solid var(--rule);
      background: var(--white);
      margin-top: 1.5rem;
      position: relative;
    }
    .pdf-container iframe {
      width: 100%; height: 90vh;
      border: none; display: block;
    }
    .pdf-fallback {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 1rem; border-top: 1px solid var(--rule);
      background: var(--white);
    }
    .pdf-fallback a {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--accent); text-decoration: none;
      font-size: 0.8rem; font-weight: 500;
    }
    .pdf-fallback a:hover { text-decoration: underline; }
    .pdf-fallback a svg { width: 14px; height: 14px; }

    /* TEAM */
    .team-section-head { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin: 2.5rem 0 1.2rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--rule); }
    .team-section-head:first-child { margin-top: 0; }
    .team-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--rule); margin-bottom: 1.5rem;
    }
    .team-card {
      background: var(--white); padding: 1.4rem;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      transition: background 0.2s;
    }
    .team-card:hover { background: #faf9f6; }
    .team-photo {
      width: 100px; height: 100px;
      background: var(--tab-bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--accent);
      flex-shrink: 0; border-radius: 50%; overflow: hidden; position: relative;
      margin-bottom: 1rem;
    }
    .team-photo img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .team-info { flex: 1; min-width: 0; }
    .team-name { font-size: 0.9rem; font-weight: 500; color: var(--ink); margin-bottom: 0.25rem; line-height: 1.3; }
    .team-name .roll { font-size: 0.68rem; color: var(--muted); font-weight: 300; display: block; margin-top: 0.15rem; margin-left: 0; }
    .team-role-badge { font-size: 0.66rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 0.35rem; display: block; }
    .team-email { font-size: 0.74rem; color: var(--muted); font-weight: 300; }
    .team-email a { color: var(--accent); text-decoration: none; }
    .team-email a:hover { text-decoration: underline; }
    .team-grid.single { grid-template-columns: 1fr; max-width: 280px; }
    @media (max-width: 900px) { .team-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .team-grid { grid-template-columns: 1fr; } }

    /* ALUMNI */
    .alumni-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); }
    .alumni-card { background: var(--white); padding: 1.4rem 1.5rem; display: flex; gap: 1rem; align-items: flex-start; transition: background 0.2s; }
    .alumni-card:hover { background: #faf9f6; }
    .alumni-initial { width: 40px; height: 40px; background: var(--tab-bg); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--accent); flex-shrink: 0; border-radius: 4px; }
    .alumni-info { flex: 1; min-width: 0; }
    .alumni-name { font-size: 0.88rem; font-weight: 500; color: var(--ink); margin-bottom: 0.3rem; line-height: 1.3; }
    .alumni-lab-role { font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 0.35rem; display: block; }
    .alumni-current { font-size: 0.79rem; color: var(--muted); line-height: 1.65; font-weight: 300; }
    .alumni-count { font-size: 0.78rem; color: var(--muted); font-weight: 300; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--rule); }
    .alumni-count strong { font-weight: 500; color: var(--ink); }
    @media (max-width: 680px) { .alumni-grid { grid-template-columns: 1fr; } }

    /* GALLERY */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--rule);
    }
    .gallery-item {
      position: relative;
      background: var(--white);
      overflow: hidden;
      aspect-ratio: 4 / 3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, filter 0.4s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.04);
    }
    .gallery-item:not(:has(img)) {
      display: flex; align-items: center; justify-content: center;
      background: var(--tab-bg);
    }
    .gallery-item:not(:has(img))::before {
      content: '⊞';
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--rule);
    }
    .gallery-tag {
      position: absolute;
      top: 0.75rem; left: 0.75rem;
      background: var(--white);
      color: var(--ink);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      line-height: 1;
      pointer-events: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      z-index: 2;
    }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(26,25,22,0.45) 100%);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    /* lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(26,25,22,0.88); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; animation: fadein 0.25s ease; }
    .lightbox img {
      max-width: 88vw; max-height: 88vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    }
    .lightbox-tag {
      position: absolute;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      background: var(--white);
      color: var(--ink);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      pointer-events: none;
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      background: none; border: none;
      color: rgba(255,255,255,0.7);
      font-size: 1.8rem; cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .lightbox-close:hover { color: #fff; }
    @media (max-width: 680px) {
      .gallery-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 420px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }

    /* JOIN */
    .j-item { padding: 1.2rem 0; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; }
    .j-item:last-child { border-bottom: 1px solid var(--rule); }
    .j-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.3rem; }
    .j-desc { font-size: 0.81rem; color: var(--muted); line-height: 1.7; font-weight: 300; }
    .j-tag { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); font-weight: 500; white-space: nowrap; padding-top: 3px; }
    .join-cta { margin-top: 2rem; padding: 1.4rem 1.6rem; background: var(--white); border: 1px solid var(--rule); }
    .join-cta p { font-size: 0.84rem; color: var(--muted); line-height: 1.8; font-weight: 300; }
    .join-cta a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .join-cta a:hover { text-decoration: underline; }

    /* CONTACT */
    .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .c-info p { font-size: 0.85rem; color: var(--muted); line-height: 1.85; font-weight: 300; margin-bottom: 1.4rem; }
    .c-line { display: flex; gap: 0.65rem; margin-bottom: 0.9rem; }
    .c-line svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; margin-top: 3px; }
    .c-line span { font-size: 0.84rem; color: var(--ink); line-height: 1.65; font-weight: 400; }
    .c-form { display: flex; flex-direction: column; gap: 0.85rem; }
    .c-form label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.22rem; }
    .c-form input, .c-form textarea { width: 100%; background: var(--white); border: 1px solid var(--rule); padding: 0.6rem 0.8rem; font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--ink); outline: none; resize: none; transition: border-color 0.2s; }
    .c-form input:focus, .c-form textarea:focus { border-color: var(--accent); }
    .c-btn { align-self: flex-start; background: var(--ink); color: var(--bg); border: none; padding: 0.65rem 1.4rem; font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .c-btn:hover { background: var(--accent); }

    footer { border-top: 1px solid var(--rule); padding: 1.3rem 3rem; display: flex; justify-content: space-between; align-items: center; background: var(--white); }
    .f-left { font-size: 0.74rem; color: var(--muted); }
    .f-right { font-size: 0.72rem; color: var(--muted); text-align: right; line-height: 1.6; }

    @media (max-width: 680px) {
      header { padding: 1.2rem 1.2rem 0; }
      .tabs { margin: 0 -1.2rem; padding: 0 1.2rem; }
      .content { padding: 2rem 1.2rem; }
      .about-layout, .contact-layout, .home-grid { grid-template-columns: 1fr; }
      footer { padding: 1.2rem; flex-direction: column; gap: 0.4rem; text-align: center; }
      .f-right { text-align: center; }
    }
  </style>
</head>
<body>
<div id="backdrop-slider"></div>
<div id="backdrop-overlay"></div>

<header>
  <div class="header-top">
    <span class="site-title">Laboratory of Chromatin Biology</span>
    <span class="site-meta">IISER Bhopal · Biological Sciences</span>
  </div>
  <ul class="tabs" role="tablist">
    <li><button class="tab-btn active" data-tab="home">Home</button></li>
    <li><button class="tab-btn" data-tab="about">About our PI</button></li>
    <li><button class="tab-btn" data-tab="research">Research</button></li>
    <li><button class="tab-btn" data-tab="publications">Publications</button></li>
    <li><button class="tab-btn" data-tab="team">Team</button></li>
    <li><button class="tab-btn" data-tab="alumni">Alumni</button></li>
    <li><button class="tab-btn" data-tab="gallery">Gallery</button></li>
    <li><button class="tab-btn" data-tab="news">News</button></li>
    <li><button class="tab-btn" data-tab="accolades">Accolades</button></li>
    <li><button class="tab-btn" data-tab="contact">Contact</button></li>
  </ul>
</header>

<main class="content" id="main-content">
  <!-- Tab panels are injected here dynamically -->
  <div class="panel active" id="tab-home">
    <div class="tab-loading">Loading…</div>
  </div>
  <div class="panel" id="tab-about"></div>
  <div class="panel" id="tab-research"></div>
  <div class="panel" id="tab-publications"></div>
  <div class="panel" id="tab-team"></div>
  <div class="panel" id="tab-alumni"></div>
  <div class="panel" id="tab-gallery"></div>
  <div class="panel" id="tab-news"></div>
  <div class="panel" id="tab-accolades"></div>
  <div class="panel" id="tab-contact"></div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
  <span class="lightbox-tag" id="lightbox-tag"></span>
</div>

<footer>
  <span class="f-left">Laboratory of Chromatin Biology · IISER Bhopal</span>
  <div class="f-right">Dept. of Biological Sciences<br></div>
</footer>

<script>
  // ── Tabs that need wider layout ──
  const WIDE_TABS = new Set(['publications', 'research']);

  // ── Cache: track which tabs have been loaded ──
  const loaded = new Set();

  const tabs   = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.panel');
  const main   = document.getElementById('main-content');

  async function loadTab(name) {
    if (loaded.has(name)) return;
    const panel = document.getElementById('tab-' + name);
    if (!panel) return;
    try {
      const res  = await fetch('sections/' + name + '.html');
      const html = await res.text();
      panel.innerHTML = html;
      loaded.add(name);
      // Re-bind gallery lightbox clicks after injecting content
      bindGallery(panel);
      // Re-bind home "link" nav buttons
      bindLinks(panel);
    } catch (e) {
      panel.innerHTML = '<p style="color:var(--muted);padding:2rem 0;">Could not load section. Make sure you are running a local server.</p>';
    }
  }

  function goTo(name) {
    tabs.forEach(t  => t.classList.toggle('active', t.dataset.tab === name));
    panels.forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    main.classList.toggle('wide', WIDE_TABS.has(name));
    window.scrollTo(0, 0);
    loadTab(name);
  }

  tabs.forEach(btn => btn.addEventListener('click', () => goTo(btn.dataset.tab)));

  function bindLinks(root) {
    root.querySelectorAll('.link[data-goto]').forEach(a => {
      a.addEventListener('click', () => goTo(a.dataset.goto));
    });
  }

  function bindGallery(root) {
    root.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', () => {
        const img = item.querySelector('img');
        if (!img) return;
        document.getElementById('lightbox-img').src = img.src;
        document.getElementById('lightbox-tag').textContent = item.dataset.label || '';
        document.getElementById('lightbox').classList.add('open');
      });
    });
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  function openPoster(card) {
    const img   = card.querySelector('img');
    if (!img) return;
    const title = card.querySelector('.poster-title');
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-tag').textContent = title ? title.textContent : '';
    document.getElementById('lightbox').classList.add('open');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── Load the default tab (home) on page load ──
  loadTab('home');
</script>
</body>
</html>
